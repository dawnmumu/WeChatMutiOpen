name: Build Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "Package.swift"
      - "Resources/**"
      - "Sources/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Build installer package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
          gh --version

      - name: Compute release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '[.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0] // "v0.1.0"')"
          CURRENT_VERSION="${CURRENT_TAG#v}"
          VERSION="$(sh scripts/next_release_version.sh "$CURRENT_VERSION")"
          {
            echo "VERSION=$VERSION"
            echo "TAG=v$VERSION"
            echo "PKG_PATH=dist/微信多开工具-$VERSION-universal.pkg"
            echo "RELEASE_PKG_PATH=dist/WeChatMutiOpen-$VERSION-universal.pkg"
          } >> "$GITHUB_ENV"
          echo "Current release version: $CURRENT_VERSION"
          echo "Next release version: $VERSION"

      - name: Run tests
        run: swift run MultiOpenTests

      - name: Build installer
        run: VERSION="$VERSION" sh scripts/package_installer.sh

      - name: Verify package
        run: |
          test -f "$PKG_PATH"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" dist/MacMultiOpen.app/Contents/Info.plist | grep "^$VERSION$"
          lipo -info dist/MacMultiOpen.app/Contents/MacOS/MacMultiOpen | grep "x86_64 arm64"
          codesign --verify --strict dist/MacMultiOpen.app
          pkgutil --payload-files "$PKG_PATH" | grep "Applications/微信多开工具.app/Contents/MacOS/MacMultiOpen"
          installer -pkg "$PKG_PATH" -target / -showChoicesXML >/dev/null

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp "$PKG_PATH" "$RELEASE_PKG_PATH"
          gh release create "$TAG" "$RELEASE_PKG_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --title "微信多开工具 $VERSION" \
            --notes "Automated universal macOS package version ${VERSION} built from commit ${GITHUB_SHA}."
